services:
  - type: web
    name: orangyapi
    runtime: node
    plan: free
    rootDir: orangutan-api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: PEXELS_API_KEY
        sync: false
  - type: web
    name: orangy-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: orangyapi
          envVarKey: RENDER_EXTERNAL_HOSTNAME
